<h1>Simple Product Management</h1>

<p>To add products permanently:</p>

<pre>/data/products.json</pre>

<p>Add new product entries like this:</p>

<pre>
{
  "name":"Product Name",
  "price":"$50",
  "description":"Description",
  "image":"IMAGE URL"
}
</pre>

<p>Save and upload updated file to GitHub Pages.</p>
