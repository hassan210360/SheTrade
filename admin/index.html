<h1>How To Update Products</h1>

<p>Edit this file:</p>

<pre>/data/products.json</pre>

<p>Add new products in this format:</p>

<pre>
{
  "name":"Product Name",
  "price":"$50",
  "description":"Description",
  "image":"IMAGE URL"
}
</pre>

<p>Then upload the updated products.json file back to GitHub.</p>

</body>
